<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject Randomizer — Covariate-Adaptive Minimization</title>
  <meta name="description" content="Randomize research subjects into balanced treatment groups using covariate-adaptive minimization. Handles continuous and categorical variables." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>" />

  <!-- Tailwind CSS v3 Play CDN (the ONLY external dependency) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    if (typeof tailwind !== 'undefined' && tailwind.config) {
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          },
        },
      };
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #0f1117; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem;
    }
    .glass-hover { transition: transform .2s, box-shadow .2s; }
    .glass-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,.15); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    .fade-up { animation: fadeUp .45s ease-out both; }

    .drag-active { background: rgba(99,102,241,.08) !important; border-color: #6366f1 !important; }

    /* Grid styles */
    .grid-table { border-collapse: collapse; width: 100%; }
    .grid-table th, .grid-table td { border: 1px solid rgba(255,255,255,0.06); padding: 0; position: relative; }
    .grid-table th { background: rgba(255,255,255,0.04); }
    .grid-cell {
      width: 100%; height: 100%; min-height: 32px; background: transparent;
      border: none; outline: none; color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif; font-size: 13px; padding: 6px 10px;
    }
    .grid-cell:focus { background: rgba(99,102,241,0.08); box-shadow: inset 0 0 0 2px rgba(99,102,241,0.4); }
    .grid-header-cell {
      width: 100%; height: 100%; min-height: 32px; background: transparent;
      border: none; outline: none; color: #94a3b8;
      font-family: 'Inter', system-ui, sans-serif; font-size: 12px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 6px 10px; text-align: left;
    }
    .grid-header-cell:focus { background: rgba(99,102,241,0.08); color: #e2e8f0; box-shadow: inset 0 0 0 2px rgba(99,102,241,0.4); }
    .row-num { width: 40px; min-width: 40px; text-align: center; color: #475569; font-size: 11px; font-variant-numeric: tabular-nums; user-select: none; }
    .row-action-btn { opacity: 0; transition: opacity .15s; }
    tr:hover .row-action-btn { opacity: 1; }
    .del-btn {
      background: none; border: none; color: #ef4444; cursor: pointer;
      font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: background .15s;
    }
    .del-btn:hover { background: rgba(239,68,68,0.15); }

    .badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 9999px; color: #fff; cursor: pointer; transition: transform .15s; }
    .badge:hover { transform: scale(1.05); }
    .badge:active { transform: scale(0.95); }
    .badge-indigo { background: linear-gradient(135deg, #6366f1, #7c3aed); }
    .badge-emerald { background: linear-gradient(135deg, #10b981, #0d9488); }
    .badge-slate { background: linear-gradient(135deg, #64748b, #475569); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 600; padding: 10px 24px; border-radius: 8px;
      border: none; color: #fff; cursor: pointer; transition: all .2s;
    }
    .btn:hover { transform: scale(1.03); }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); box-shadow: 0 4px 14px rgba(99,102,241,.25); }
    .btn-success { background: linear-gradient(135deg, #10b981, #0d9488); box-shadow: 0 4px 14px rgba(16,185,129,.25); }
    .btn-upload { background: linear-gradient(135deg, #6366f1, #7c3aed); box-shadow: 0 4px 14px rgba(99,102,241,.2); }

    .group-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 9999px; color: #fff; }
  </style>
</head>

<body class="dark">
  <div id="randomizer-root"></div>

  <script>
  /* ══════════════════════════════════════════════════════════════
     MINIMIZATION ENGINE — Pure functional JavaScript
     ══════════════════════════════════════════════════════════════ */
  function fisherYatesShuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function mean(nums) {
    if (!nums.length) return 0;
    return nums.reduce((s, v) => s + v, 0) / nums.length;
  }
  function calcContinuousImbalance(groups, col) {
    const means = groups.map(g => {
      const v = g.map(s => parseFloat(s[col])).filter(n => !isNaN(n));
      return mean(v);
    });
    return Math.max(...means) - Math.min(...means);
  }
  function calcCategoricalImbalance(groups, col) {
    const levels = new Set();
    groups.forEach(g => g.forEach(s => levels.add(String(s[col]))));
    let imb = 0;
    for (const lv of levels) {
      const c = groups.map(g => g.filter(s => String(s[col]) === lv).length);
      imb += Math.max(...c) - Math.min(...c);
    }
    return imb;
  }
  function calcTotalImbalance(groups, schema) {
    let t = 0;
    for (const [col, type] of Object.entries(schema)) {
      if (type === 'continuous')  t += calcContinuousImbalance(groups, col);
      if (type === 'categorical') t += calcCategoricalImbalance(groups, col);
    }
    return t;
  }
  function assignSubject(subject, groups, n, schema) {
    let best = Infinity, idxs = [];
    for (let g = 0; g < n; g++) {
      const trial = groups.map(a => a.slice());
      trial[g].push(subject);
      const s = calcTotalImbalance(trial, schema);
      if (s < best) { best = s; idxs = [g]; }
      else if (s === best) idxs.push(g);
    }
    return idxs[Math.floor(Math.random() * idxs.length)];
  }
  function runMinimization(subjects, numGroups, schema) {
    const shuffled = fisherYatesShuffle(subjects);
    const groups = Array.from({ length: numGroups }, () => []);
    const assignments = [];
    for (const s of shuffled) {
      const g = assignSubject(s, groups, numGroups, schema);
      groups[g].push(s);
      assignments.push({ subject: s, group: g });
    }
    return { groups, assignments };
  }
  function summarizeGroups(groups, schema) {
    return groups.map((g, i) => {
      const o = { groupIndex: i, count: g.length, means: {}, counts: {} };
      for (const [col, type] of Object.entries(schema)) {
        if (type === 'continuous') {
          const v = g.map(s => parseFloat(s[col])).filter(n => !isNaN(n));
          o.means[col] = v.length ? mean(v) : null;
        } else if (type === 'categorical') {
          const f = {};
          g.forEach(s => { const k = String(s[col]); f[k] = (f[k]||0)+1; });
          o.counts[col] = f;
        }
      }
      return o;
    });
  }

  /* ══════════════════════════════════════════════════════════════
     INLINE CSV PARSER — No PapaParse needed
     ══════════════════════════════════════════════════════════════ */
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    // Detect separator
    const sep = lines[0].includes('\t') ? '\t' : ',';
    const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g, ''));
    const data = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = lines[i].split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
      if (cells.every(c => c === '')) continue;
      const row = {};
      headers.forEach((h, idx) => { row[h] = cells[idx] || ''; });
      data.push(row);
    }
    return data;
  }

  function unparseCSV(data) {
    if (!data.length) return '';
    const headers = Object.keys(data[0]);
    const lines = [headers.join(',')];
    for (const row of data) {
      lines.push(headers.map(h => {
        const v = String(row[h] ?? '');
        return v.includes(',') || v.includes('"') || v.includes('\n') ? '"' + v.replace(/"/g, '""') + '"' : v;
      }).join(','));
    }
    return lines.join('\n');
  }

  /* ══════════════════════════════════════════════════════════════
     HELPERS
     ══════════════════════════════════════════════════════════════ */
  const GROUP_GRADIENTS = [
    'linear-gradient(135deg, #6366f1, #7c3aed)',
    'linear-gradient(135deg, #10b981, #0d9488)',
    'linear-gradient(135deg, #f59e0b, #ea580c)',
    'linear-gradient(135deg, #f43f5e, #ec4899)',
    'linear-gradient(135deg, #06b6d4, #0284c7)',
    'linear-gradient(135deg, #d946ef, #9333ea)',
    'linear-gradient(135deg, #84cc16, #16a34a)',
    'linear-gradient(135deg, #ef4444, #f43f5e)',
  ];
  function gg(i) { return GROUP_GRADIENTS[i % GROUP_GRADIENTS.length]; }

  function guessType(values) {
    const sample = values.slice(0, 50);
    const numCount = sample.filter(v => v !== '' && v != null && !isNaN(Number(v))).length;
    return numCount / sample.length > 0.7 ? 'continuous' : 'categorical';
  }

  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
        else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'className') e.className = v;
        else if (k === 'htmlFor') e.setAttribute('for', v);
        else e.setAttribute(k, v);
      }
    }
    for (const c of children) {
      if (c == null) continue;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
      else if (Array.isArray(c)) c.forEach(x => x && e.appendChild(x));
      else e.appendChild(c);
    }
    return e;
  }

  /* ══════════════════════════════════════════════════════════════
     APP STATE
     ══════════════════════════════════════════════════════════════ */
  const state = {
    columns: ['SubjectID', 'Col1', 'Col2'],
    data: Array.from({ length: 5 }, () => ({ SubjectID: '', Col1: '', Col2: '' })),
    schema: {},
    numGroups: 3,
    results: null,
    fileName: '',
  };

  /* ══════════════════════════════════════════════════════════════
     RENDER FUNCTIONS
     ══════════════════════════════════════════════════════════════ */
  function getFilledRows() {
    return state.data.filter(r => state.columns.some(c => r[c] != null && String(r[c]).trim() !== ''));
  }

  function autoDetectSchema() {
    const rows = getFilledRows();
    if (!rows.length) { state.schema = {}; return; }
    const s = {};
    state.columns.forEach(col => { s[col] = guessType(rows.map(r => r[col])); });
    state.schema = s;
  }

  function ingestData(data) {
    if (!data.length) return;
    state.columns = Object.keys(data[0]);
    state.data = data;
    state.results = null;
    autoDetectSchema();
    render();
  }

  function handleFile(file) {
    if (!file) return;
    state.fileName = file.name;
    const ext = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();
    if (ext === 'csv' || ext === 'tsv' || ext === 'txt') {
      reader.onload = e => ingestData(parseCSV(e.target.result));
      reader.readAsText(file);
    } else {
      // For XLSX: try to parse if SheetJS is loaded, otherwise alert
      reader.onload = e => {
        if (typeof XLSX !== 'undefined') {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
          ingestData(data);
        } else {
          alert('XLSX support requires the SheetJS library. Please save your file as .csv and upload again.');
        }
      };
      reader.readAsArrayBuffer(file);
    }
  }

  /* ── Build Input Grid ── */
  function buildInputGrid() {
    const container = el('div', { className: 'overflow-x-auto rounded-xl border border-white/[.06]' });
    const table = el('table', { className: 'grid-table' });

    // Header
    const thead = el('thead');
    const hRow = el('tr');
    hRow.appendChild(el('th', { className: 'row-num', style: { background: 'rgba(255,255,255,0.03)' } }));
    state.columns.forEach((col, ci) => {
      const th = el('th', { className: 'relative group', style: { minWidth: '100px' } });
      const inp = el('input', { className: 'grid-header-cell', value: col });
      inp.addEventListener('blur', () => {
        const newName = inp.value.trim() || `Col${ci + 1}`;
        if (newName === state.columns[ci]) return;
        const oldName = state.columns[ci];
        state.columns[ci] = newName;
        state.data = state.data.map(row => {
          const r = {};
          state.columns.forEach((c, i) => { r[c] = i === ci ? row[oldName] ?? '' : row[c] ?? ''; });
          // Remove old key if name changed
          return r;
        });
        autoDetectSchema();
        render();
      });
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
      th.appendChild(inp);
      if (state.columns.length > 1) {
        const delBtn = el('button', {
          className: 'del-btn row-action-btn',
          title: 'Remove column',
          style: { position: 'absolute', top: '2px', right: '2px' },
          onClick: () => {
            const colName = state.columns[ci];
            state.columns.splice(ci, 1);
            state.data = state.data.map(row => { const r = { ...row }; delete r[colName]; return r; });
            autoDetectSchema();
            render();
          }
        }, '×');
        th.appendChild(delBtn);
      }
      hRow.appendChild(th);
    });
    // Add column button
    const addColTh = el('th', { style: { width: '40px', background: 'rgba(255,255,255,0.03)' } });
    addColTh.appendChild(el('button', {
      className: 'del-btn',
      style: { opacity: '1', width: '100%', color: '#818cf8' },
      title: 'Add column',
      onClick: () => {
        const name = `Col${state.columns.length + 1}`;
        state.columns.push(name);
        state.data.forEach(r => { r[name] = ''; });
        autoDetectSchema();
        render();
      }
    }, '+'));
    hRow.appendChild(addColTh);
    thead.appendChild(hRow);
    table.appendChild(thead);

    // Body
    const tbody = el('tbody');
    state.data.forEach((row, ri) => {
      const tr = el('tr', { className: 'group' });
      const numTd = el('td', { className: 'row-num relative' }, String(ri + 1));
      if (state.data.length > 1) {
        const delRow = el('button', {
          className: 'del-btn row-action-btn',
          title: 'Remove row',
          style: { position: 'absolute', inset: '0', width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(15,17,23,0.8)' },
          onClick: () => { state.data.splice(ri, 1); autoDetectSchema(); render(); }
        }, '×');
        numTd.appendChild(delRow);
      }
      tr.appendChild(numTd);

      state.columns.forEach((col, ci) => {
        const td = el('td');
        const inp = el('input', {
          className: 'grid-cell',
          value: row[col] ?? '',
          'data-r': String(ri),
          'data-c': String(ci),
        });
        inp.addEventListener('input', () => { state.data[ri][col] = inp.value; autoDetectSchema(); renderStatus(); });
        inp.addEventListener('paste', e => handleGridPaste(e, ri, ci));
        inp.addEventListener('keydown', e => handleGridKeyDown(e, ri, ci));
        td.appendChild(inp);
        tr.appendChild(td);
      });
      tr.appendChild(el('td', { style: { width: '40px' } }));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);

    // Add Row button
    const addRowBtn = el('button', {
      className: 'w-full py-2 text-xs font-medium cursor-pointer',
      style: { color: '#818cf8', borderTop: '1px solid rgba(255,255,255,0.06)', background: 'transparent', border: 'none', borderTop: '1px solid rgba(255,255,255,0.06)', padding: '8px', fontSize: '12px', fontWeight: '500', cursor: 'pointer', width: '100%' },
      onClick: () => {
        const emptyRow = {};
        state.columns.forEach(c => { emptyRow[c] = ''; });
        state.data.push(emptyRow);
        render();
      }
    }, '+ Add Row');
    addRowBtn.addEventListener('mouseenter', () => { addRowBtn.style.color = '#a5b4fc'; addRowBtn.style.background = 'rgba(255,255,255,0.02)'; });
    addRowBtn.addEventListener('mouseleave', () => { addRowBtn.style.color = '#818cf8'; addRowBtn.style.background = 'transparent'; });

    const wrapper = el('div');
    wrapper.appendChild(container);
    wrapper.appendChild(addRowBtn);
    return wrapper;
  }

  function handleGridPaste(e, rowIdx, colIdx) {
    const text = e.clipboardData.getData('text/plain');
    if (!text) return;
    const lines = text.trim().split(/\r?\n/);
    if (lines.length > 1 || lines[0].includes('\t') || lines[0].includes(',')) {
      e.preventDefault();
      const sep = lines[0].includes('\t') ? '\t' : ',';
      const parsed = lines.map(l => l.split(sep).map(c => c.trim()));

      if (rowIdx === 0 && colIdx === 0 && state.data.every(r => state.columns.every(c => !r[c]))) {
        const headers = parsed[0];
        const rows = parsed.slice(1).map(cells => {
          const r = {};
          headers.forEach((h, i) => { r[h] = cells[i] || ''; });
          return r;
        });
        state.columns = headers;
        state.data = rows;
      } else {
        for (let dr = 0; dr < parsed.length; dr++) {
          const targetRow = rowIdx + dr;
          if (targetRow >= state.data.length) {
            const emptyRow = {};
            state.columns.forEach(c => { emptyRow[c] = ''; });
            state.data.push(emptyRow);
          }
          for (let dc = 0; dc < parsed[dr].length; dc++) {
            const targetCol = colIdx + dc;
            if (targetCol < state.columns.length) {
              state.data[targetRow][state.columns[targetCol]] = parsed[dr][dc];
            }
          }
        }
      }
      autoDetectSchema();
      render();
    }
  }

  function handleGridKeyDown(e, rowIdx, colIdx) {
    const grid = document.getElementById('input-grid');
    if (!grid) return;
    if (e.key === 'Tab') {
      e.preventDefault();
      const nc = e.shiftKey ? colIdx - 1 : colIdx + 1;
      if (nc >= 0 && nc < state.columns.length) {
        const cell = grid.querySelector(`[data-r="${rowIdx}"][data-c="${nc}"]`);
        if (cell) cell.focus();
      } else if (!e.shiftKey && nc >= state.columns.length && rowIdx + 1 < state.data.length) {
        const cell = grid.querySelector(`[data-r="${rowIdx + 1}"][data-c="0"]`);
        if (cell) cell.focus();
      }
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      const cell = grid.querySelector(`[data-r="${rowIdx + 1}"][data-c="${colIdx}"]`);
      if (cell) cell.focus();
    }
  }

  /* ── Schema Editor ── */
  function buildSchemaEditor() {
    const cols = Object.keys(state.schema);
    if (!cols.length) return null;

    const typeLabels = { continuous: 'Continuous', categorical: 'Categorical', id: 'ID (skip)' };
    const typeClasses = { continuous: 'badge-indigo', categorical: 'badge-emerald', id: 'badge-slate' };
    const cycle = ['continuous', 'categorical', 'id'];

    const container = el('div', { className: 'glass rounded-xl p-5 fade-up' });
    container.appendChild(el('h3', { className: 'text-slate-200 font-semibold text-base', style: { marginBottom: '4px' } }, '🏷️ Column Types'));
    container.appendChild(el('p', { style: { color: '#64748b', fontSize: '12px', marginBottom: '16px' } }, 'Click a badge to cycle: Continuous → Categorical → ID (skip) → …'));

    const wrap = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '12px' } });
    cols.forEach(c => {
      const chip = el('div', {
        style: { display: 'flex', alignItems: 'center', gap: '8px', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: '8px', padding: '6px 12px' }
      });
      chip.appendChild(el('span', { style: { color: '#cbd5e1', fontSize: '14px', fontWeight: '500' } }, c));
      const badge = el('span', {
        className: `badge ${typeClasses[state.schema[c]]}`,
        onClick: () => {
          const i = cycle.indexOf(state.schema[c]);
          state.schema[c] = cycle[(i + 1) % cycle.length];
          render();
        }
      }, typeLabels[state.schema[c]]);
      chip.appendChild(badge);
      wrap.appendChild(chip);
    });
    container.appendChild(wrap);
    return container;
  }

  /* ── Summary Cards ── */
  function buildSummaryCards() {
    if (!state.results) return null;
    const { summaries, activeSchema } = state.results;
    const contCols = Object.entries(activeSchema).filter(([,t]) => t === 'continuous').map(([c]) => c);
    const catCols  = Object.entries(activeSchema).filter(([,t]) => t === 'categorical').map(([c]) => c);

    const grid = el('div', { className: 'grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4' });
    summaries.forEach((s, i) => {
      const card = el('div', { className: 'glass glass-hover rounded-xl p-5 fade-up', style: { animationDelay: `${i * .07}s` } });

      // Header
      const header = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' } });
      const groupBadge = el('span', { className: 'group-badge', style: { background: gg(i) } }, `Group ${i + 1}`);
      header.appendChild(groupBadge);
      header.appendChild(el('span', { style: { color: '#64748b', fontSize: '12px', marginLeft: 'auto' } }, `${s.count} subjects`));
      card.appendChild(header);

      // Continuous means
      if (contCols.length > 0) {
        const sec = el('div', { style: { marginBottom: '12px' } });
        sec.appendChild(el('p', { style: { fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.1em', color: '#64748b', marginBottom: '6px' } }, 'Means'));
        contCols.forEach(c => {
          const row = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', padding: '2px 0' } });
          row.appendChild(el('span', { style: { color: '#94a3b8' } }, `${c}:`));
          row.appendChild(el('span', { style: { color: '#e2e8f0', fontFamily: 'monospace', marginLeft: '8px' } }, s.means[c] != null ? s.means[c].toFixed(3) : '—'));
          sec.appendChild(row);
        });
        card.appendChild(sec);
      }

      // Categorical counts
      catCols.forEach(c => {
        const sec = el('div', { style: { marginBottom: '12px' } });
        sec.appendChild(el('p', { style: { fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.1em', color: '#64748b', marginBottom: '6px' } }, c));
        if (s.counts[c]) {
          Object.entries(s.counts[c]).forEach(([lv, n]) => {
            const row = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', padding: '2px 0' } });
            row.appendChild(el('span', { style: { color: '#94a3b8' } }, `${lv}:`));
            row.appendChild(el('span', { style: { color: '#e2e8f0', fontFamily: 'monospace', marginLeft: '8px' } }, String(n)));
            sec.appendChild(row);
          });
        }
        card.appendChild(sec);
      });

      grid.appendChild(card);
    });
    return grid;
  }

  /* ── Output Grid ── */
  function buildOutputGrid() {
    if (!state.results) return null;
    const { assignments } = state.results;
    const outputCols = ['AssignedGroup', ...state.columns];
    const outputData = assignments.map(a => ({
      AssignedGroup: `Group ${a.group + 1}`,
      _groupIdx: a.group,
      ...a.subject,
    }));

    const container = el('div', { className: 'overflow-x-auto rounded-xl border border-white/[.06]' });
    const table = el('table', { className: 'grid-table' });

    // Header
    const thead = el('thead');
    const hRow = el('tr');
    hRow.appendChild(el('th', { className: 'row-num', style: { background: 'rgba(255,255,255,0.03)' } }));
    outputCols.forEach(col => {
      const th = el('th', { style: { minWidth: '100px' } });
      th.appendChild(el('div', { className: 'grid-header-cell' }, col));
      hRow.appendChild(th);
    });
    thead.appendChild(hRow);
    table.appendChild(thead);

    // Body
    const tbody = el('tbody');
    outputData.forEach((row, ri) => {
      const tr = el('tr', { className: 'group' });
      tr.appendChild(el('td', { className: 'row-num' }, String(ri + 1)));
      outputCols.forEach(col => {
        const td = el('td');
        if (col === 'AssignedGroup') {
          const cellDiv = el('div', { className: 'grid-cell', style: { display: 'flex', alignItems: 'center' } });
          const badge = el('span', { className: 'group-badge', style: { background: gg(row._groupIdx) } }, row[col]);
          cellDiv.appendChild(badge);
          td.appendChild(cellDiv);
        } else {
          const inp = el('input', { className: 'grid-cell', value: row[col] ?? '' });
          inp.addEventListener('input', () => { outputData[ri][col] = inp.value; });
          td.appendChild(inp);
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);

    const wrapper = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '12px' } });
    wrapper.appendChild(container);

    // Download button
    const dlBtn = el('button', {
      className: 'btn btn-success',
      onClick: () => {
        const out = outputData.map(r => {
          const { _groupIdx, ...rest } = r;
          return rest;
        });
        const csv = unparseCSV(out);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'randomization_results.csv';
        a.click();
      }
    }, '⬇ Download CSV');
    wrapper.appendChild(dlBtn);
    return wrapper;
  }

  /* ── Status line ── */
  function renderStatus() {
    const statusEl = document.getElementById('data-status');
    if (!statusEl) return;
    const rows = getFilledRows();
    if (rows.length > 0) {
      statusEl.textContent = `✔ ${rows.length} subjects loaded · ${state.columns.length} columns detected`;
      statusEl.style.display = '';
    } else {
      statusEl.style.display = 'none';
    }
  }

  /* ══════════════════════════════════════════════════════════════
     MAIN RENDER
     ══════════════════════════════════════════════════════════════ */
  function render() {
    autoDetectSchema();
    const root = document.getElementById('randomizer-root');
    root.innerHTML = '';

    const page = el('div', {
      className: 'min-h-screen py-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto',
      style: { display: 'flex', flexDirection: 'column', gap: '24px' }
    });

    // Header
    const header = el('header', { className: 'text-center fade-up', style: { marginBottom: '8px' } });
    header.appendChild(el('h1', {
      className: 'text-3xl sm:text-4xl font-extrabold leading-tight',
      style: { background: 'linear-gradient(90deg, #818cf8, #a78bfa, #d946ef)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }
    }, 'Subject Randomizer'));
    header.appendChild(el('p', { style: { color: '#64748b', fontSize: '14px', marginTop: '4px' } }, 'Covariate-Adaptive Minimization for Preclinical Studies'));
    page.appendChild(header);

    // Warning banner
    const warning = el('div', {
      className: 'fade-up',
      style: { background: 'linear-gradient(90deg, rgba(245,158,11,0.1), rgba(234,88,12,0.1))', border: '1px solid rgba(245,158,11,0.3)', borderRadius: '12px', padding: '12px 20px', display: 'flex', alignItems: 'center', gap: '12px' }
    });
    warning.appendChild(el('span', { style: { fontSize: '24px' } }, '⚠️'));
    const warnText = el('p', { style: { color: '#fcd34d', fontSize: '14px', fontWeight: '500' } });
    warnText.innerHTML = '<strong>NOTE:</strong> Download your output data before closing this window. Results are not saved automatically.';
    warning.appendChild(warnText);
    page.appendChild(warning);

    // Instructions
    const instrBox = el('div', { className: 'glass rounded-xl p-5 fade-up', style: { fontSize: '14px', color: '#94a3b8' } });
    instrBox.appendChild(el('h3', { style: { color: '#e2e8f0', fontWeight: '600', fontSize: '16px', marginBottom: '8px' } }, '📋 How to use this tool'));
    const ol = el('ol', { style: { listStyleType: 'decimal', paddingLeft: '20px', lineHeight: '1.7' } });
    ol.innerHTML = `
      <li><strong style="color:#cbd5e1">Upload or enter your data</strong> — Click <em>"Upload File"</em> to upload a <code style="background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:3px;font-size:12px">.csv</code> file, <strong>or</strong> type directly into the spreadsheet grid below. You can also <strong>paste</strong> tabular data (from Excel, Google Sheets, etc.) into the first cell and it will auto-parse into rows and columns.</li>
      <li><strong style="color:#cbd5e1">Review detected columns</strong> — The tool auto-detects whether each column is <em>Continuous</em> (numbers) or <em>Categorical</em> (text/labels). Click the <span style="color:#818cf8;font-weight:600">badge</span> to cycle: Continuous → Categorical → ID (skip).</li>
      <li><strong style="color:#cbd5e1">Set number of groups</strong> — Choose how many treatment groups you need (2–20).</li>
      <li><strong style="color:#cbd5e1">Randomize</strong> — Click the button. The minimization algorithm will assign each subject to the group that keeps covariates most balanced.</li>
      <li><strong style="color:#cbd5e1">Download</strong> — Click <em>"Download CSV"</em> below the results grid to save your data.</li>
    `;
    instrBox.appendChild(ol);
    page.appendChild(instrBox);

    // Data Input Card
    const dataCard = el('div', { className: 'glass rounded-xl p-6 fade-up', style: { display: 'flex', flexDirection: 'column', gap: '16px' } });
    // Drag & drop handlers
    dataCard.addEventListener('dragover', e => { e.preventDefault(); dataCard.classList.add('drag-active'); });
    dataCard.addEventListener('dragleave', () => { dataCard.classList.remove('drag-active'); });
    dataCard.addEventListener('drop', e => { e.preventDefault(); dataCard.classList.remove('drag-active'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

    const dataHeader = el('div', { style: { display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: '12px' } });
    dataHeader.appendChild(el('h3', { style: { color: '#e2e8f0', fontWeight: '600', fontSize: '16px' } }, '📂 Enter or Upload Your Data'));
    const uploadWrap = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } });
    const fileInput = el('input', { type: 'file', accept: '.csv,.tsv,.txt', id: 'file-upload', style: { display: 'none' } });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
    uploadWrap.appendChild(fileInput);
    uploadWrap.appendChild(el('button', { className: 'btn btn-upload', onClick: () => fileInput.click() }, '📄 Upload File'));
    if (state.fileName) uploadWrap.appendChild(el('span', { style: { color: '#94a3b8', fontSize: '12px' } }, `✔ ${state.fileName}`));
    uploadWrap.appendChild(el('span', { style: { color: '#475569', fontSize: '12px' } }, '.csv · .tsv — or drag & drop'));
    dataHeader.appendChild(uploadWrap);
    dataCard.appendChild(dataHeader);

    // Grid
    const gridWrapper = buildInputGrid();
    gridWrapper.id = 'input-grid';
    dataCard.appendChild(gridWrapper);

    // Status
    const statusP = el('p', { id: 'data-status', style: { color: '#34d399', fontSize: '12px', fontWeight: '500', display: 'none' } });
    dataCard.appendChild(statusP);
    page.appendChild(dataCard);

    // Schema
    const hasData = getFilledRows().length > 0;
    if (hasData) {
      const schemaEl = buildSchemaEditor();
      if (schemaEl) page.appendChild(schemaEl);
    }

    // Controls
    if (hasData) {
      const controls = el('div', { className: 'fade-up', style: { display: 'flex', flexWrap: 'wrap', alignItems: 'flex-end', gap: '16px' } });
      const groupDiv = el('div');
      groupDiv.appendChild(el('label', { style: { display: 'block', fontSize: '12px', color: '#64748b', marginBottom: '4px', fontWeight: '500' } }, 'Number of Groups'));
      const groupInput = el('input', {
        type: 'number', min: '2', max: '20', value: String(state.numGroups),
        style: { width: '80px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '8px 12px', fontSize: '14px', color: '#e2e8f0', outline: 'none' }
      });
      groupInput.addEventListener('input', () => { state.numGroups = Math.max(2, Math.min(20, +groupInput.value)); });
      groupInput.addEventListener('focus', () => { groupInput.style.boxShadow = '0 0 0 2px rgba(99,102,241,0.4)'; });
      groupInput.addEventListener('blur', () => { groupInput.style.boxShadow = 'none'; });
      groupDiv.appendChild(groupInput);
      controls.appendChild(groupDiv);

      controls.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: () => {
          const activeSchema = {};
          for (const [col, type] of Object.entries(state.schema)) {
            if (type !== 'id') activeSchema[col] = type;
          }
          const rows = getFilledRows();
          const res = runMinimization(rows, state.numGroups, activeSchema);
          const summaries = summarizeGroups(res.groups, activeSchema);
          state.results = { ...res, summaries, activeSchema };
          render();
        }
      }, '🎲 Randomize'));
      page.appendChild(controls);
    }

    // Results
    if (state.results) {
      const resultsSection = el('div', { className: 'fade-up', style: { display: 'flex', flexDirection: 'column', gap: '24px' } });
      resultsSection.appendChild(el('h2', { style: { fontSize: '20px', fontWeight: '700', color: '#e2e8f0' } }, 'Group Summaries'));
      const cards = buildSummaryCards();
      if (cards) resultsSection.appendChild(cards);
      resultsSection.appendChild(el('h2', { style: { fontSize: '20px', fontWeight: '700', color: '#e2e8f0' } }, 'Full Assignments'));
      const outputGrid = buildOutputGrid();
      if (outputGrid) resultsSection.appendChild(outputGrid);
      page.appendChild(resultsSection);
    }

    // Footer
    page.appendChild(el('footer', {
      style: { textAlign: 'center', color: '#334155', fontSize: '12px', paddingTop: '32px', paddingBottom: '16px' }
    }, `Subject Randomizer · Covariate-Adaptive Minimization · © ${new Date().getFullYear()}`));

    root.appendChild(page);
    renderStatus();
  }

  // Initial render
  render();
  </script>
</body>
</html>
